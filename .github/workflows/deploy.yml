name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Forbidden-word check (Starfinder/Charakterbogen)
        run: |
          if git grep -iIlE 'Starfinder|Charakterbogen' -- . ':!.githooks' ':!.github/workflows/deploy.yml'; then
            echo "::error::Forbidden word found (Starfinder/Charakterbogen) — see AGENTS.md"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: Build
        run: npm run build
        working-directory: app

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

      - uses: actions/deploy-pages@v4
        id: deployment
